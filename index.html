  .who-line{
    background:var(--bg-card);
    border-radius:6px;
    padding:16px 18px;
    border:1px solid var(--brown-line-soft);
  }
  .who-line p{ margin:0; }

  .nav-footer{
    margin-top:60px;
    padding-top:22px;
    border-top:1px solid var(--brown-line);
    display:flex;
    justify-content:space-between;
    font-size:13.5px;
    color:var(--brown-mid);
  }
  .nav-footer div{ cursor:pointer; }
  .nav-footer div:hover{ color:var(--accent); }

  /* Comparison layout (Civil and Common Law) */
  .compare-block{ margin-top:16px; }
  .compare-title{
    font-family:'Fraunces', serif;
    font-size:19px;
    color:var(--brown-deep);
    margin-bottom:12px;
    font-weight:600;
  }
  .compare-table{
    display:grid;
    grid-template-columns:150px 1fr 1fr;
    border:1px solid var(--brown-line-soft);
    border-radius:8px;
    overflow:hidden;
    background:var(--bg-card);
  }
  .compare-table .ch{
    padding:12px 14px;
    font-family:'Space Mono', monospace;
    font-size:11.5px;
    letter-spacing:0.05em;
    text-transform:uppercase;
    background:var(--brown-deep);
    color:#E8DFC8;
  }
  .compare-table .ch.corner{ background:var(--brown-deep); color:#8C6B3F; }
  .compare-table .row-label{
    padding:14px;
    font-size:13px;
    color:var(--brown-mid);
    font-weight:600;
    background:var(--bg-card-hover);
    border-top:1px solid var(--brown-line-soft);
    display:flex;
    align-items:center;
  }
  .compare-table .cell{
    padding:14px;
    font-size:14.5px;
    color:var(--ink-soft);
    border-top:1px solid var(--brown-line-soft);
    border-left:1px solid var(--brown-line-soft);
  }

  .orient-topic{ margin-top:36px; padding-bottom:32px; border-bottom:1px solid var(--brown-line-soft); }
  .orient-topic:last-child{ border-bottom:none; }
  .orient-topic .otitle{ font-size:20px; margin-bottom:10px; }
  .orient-topic p{ color:var(--ink-soft); font-size:15.5px; }
  .flow-row{ display:flex; flex-wrap:wrap; align-items:center; gap:6px; margin-top:14px; }
  .flow-row .fstep{
    background:var(--bg-card);
    border:1px solid var(--brown-line-soft);
    border-radius:4px;
    padding:8px 12px;
    font-size:13px;
    color:var(--brown-deep);
  }
  .flow-row .fsep{ color:var(--brown-mid); font-size:14px; }

  @media (max-width: 860px){
    #sidebar{
      position:fixed; left:0; top:0;
      transform:translateX(-100%);
      transition:transform 0.2s ease;
      z-index:40;
      width:260px;
    }
    #sidebar.open{ transform:translateX(0); }
    #menu-toggle{ display:block; }
    #main{ padding:80px 20px 80px; }
    .hero h1{ font-size:32px; }
    .term-grid{ grid-template-columns:1fr; }
    .detail-title{ font-size:28px; }
    .compare-table{ grid-template-columns:110px 1fr 1fr; font-size:12px; }
  }
</style>

const SECTIONS = [

    who: "A plaintiff and a defendant, not a state and an accused. Civil litigators represent each side, and no prosecutor is involved anywhere in the process.",

      ["Tort","A civil wrong causing harm, such as negligence or defamation, that the injured party can sue over."],
      ["Injunction","A court order requiring someone to do, or stop doing, something."],
      ["Precedent","A past court decision that guides how similar future cases are decided."],
      ["Stare decisis","Latin for \u201cto stand by things decided,\u201d the principle that courts follow precedent."]
    ],
    example: "If someone slips on an unmarked wet floor in a store and gets hurt, suing the store for damages is a civil case, resolved directly between the injured person and the store. The rules that shape how that case unfolds, what counts as evidence, and how a judge weighs a similar case from ten years ago, come from the common law system used across the U.S.: built case by case, rather than from one master rulebook."
  },
  {

    who: "Prosecutors represent the government and decide what charges to bring. Defense attorneys, whether private or public defenders, represent the accused. Judges oversee the process and, if there is no jury, decide the outcome themselves.",

    terms: [
      ["Felony","A serious crime generally punishable by more than a year in prison, such as robbery or murder."],
      ["Misdemeanor","A less serious crime, typically punishable by under a year in jail or a fine."],

      ["Miranda rights","Warnings police must give a suspect in custody before questioning, including the right to remain silent."],

  {

    who: "Corporate or transactional attorneys, in-house counsel, and mergers and acquisitions teams, negotiating and drafting rather than arguing cases in front of a judge.",

    terms: [

  },

/* ================= RENDERING ================= */

const sidebarSections = document.getElementById('sidebar-sections');
SECTIONS.forEach(s => {
  const el = document.createElement('div');
  el.className = 'nav-item';
  el.dataset.nav = 'section-' + s.id;
  el.innerHTML = `<span class="code">${s.code.split(' ')[0]}</span>${s.title}`;
  sidebarSections.appendChild(el);
});

function renderHome(){
  return `
    <div class="hero">
      <div class="eyebrow">Law 101</div>
      <h1>A field guide for<br>the legally curious.</h1>
      <div class="tagline-big">Law, one term at a time.</div>
    </div>

    <div class="home-copy">
      <p>Law 101 is a plain-English breakdown of the legal system, built for anyone stepping into it for the first time: pre-law students, new interns, or anyone who has ever sat through a legal conversation nodding along without fully following it. It is not a substitute for legal advice, and it will not make anyone a lawyer. What it will do is make the vocabulary, the systems, and the reasoning behind the law a little less intimidating.</p>

      <p>Each practice area in the sidebar to the left is broken down the same way: what it actually covers, who spends their career working in it, the vocabulary you need to keep up in conversation, why it matters in the bigger picture, and one simple, real-world example of how it plays out.</p>

      <h3>Where to start</h3>
      <p>Civil and Common Law sits first because it is less a single topic and more the foundation the rest of the site builds on: the difference between a civil case and a criminal one, and the difference between a common law system and a civil law system. From there, Criminal, Corporate, Employment, Contract, Family, Intellectual Property, and Constitutional Law each follow the same structure, so once you know how to read one section, you know how to read all of them.</p>

      <p>A separate <span class="inline-link" data-nav="orientation">Orientation</span> section covers how the legal system itself actually works: court structure, precedent, the difference between state and federal law, and the path someone takes to become a lawyer in the first place.</p>

      <p>You can find the different practice areas of law in the sidebar to the left. Each one is broken down to build a clearer understanding, so feel free to move through them in whatever order makes the most sense to you.</p>

      <h3>Who this is for</h3>
      <ul>
        <li>A student considering law school, who wants context before their first class.</li>
        <li>Any student simply curious about law, whether or not they plan to study it formally.</li>
        <li>A new intern trying to keep up with terms nobody stops to explain.</li>
        <li>Anyone who wants to read a contract, a news story, or a court case and actually understand it.</li>
      </ul>
    </div>

    <div class="origin-line">
      <span class="label">Why this exists</span>
      <p>This site started as a way to make sense of my own first weeks inside a law firm. I kept a running list of terms I had to look up, concepts I had to have explained twice, and moments where I wished a single page existed that could have caught me up before I walked in the door. This is that page, rebuilt for whoever needs it next.</p>
      <div class="signed">Gianna Absi</div>
    </div>

    <div class="site-footer">
      <div>Law 101, by Gianna Absi</div>
      <div class="inline-link" data-nav="orientation" style="color:var(--brown-mid);">How Law Actually Works &rarr;</div>
    </div>
  `;
}

function renderComparisonSection(s){
  const idx = SECTIONS.indexOf(s);
  const prev = SECTIONS[(idx - 1 + SECTIONS.length) % SECTIONS.length];
  const next = SECTIONS[(idx + 1) % SECTIONS.length];

  const compareBlocks = s.comparisons.map(c => {
    const rows = c.rows.map(([label, a, b]) => `
      <div class="row-label">${label}</div>
      <div class="cell">${a}</div>
      <div class="cell">${b}</div>
    `).join('');
    return `
      <div class="compare-block">
        <div class="compare-title">${c.title}</div>
        <div class="compare-table">
          <div class="ch corner"></div>
          <div class="ch">${c.title.split(' vs. ')[0]}</div>
          <div class="ch">${c.title.split(' vs. ')[1]}</div>
          ${rows}
        </div>
      </div>
    `;
  }).join('<div style="height:34px;"></div>');

  const terms = s.terms.map(([name, def]) => `
    <div class="term-card">
      <div class="term-name">${name}</div>
      <div class="term-def">${def}</div>
    </div>`).join('');

  return `
    <div class="back-link" data-nav="home">&larr; Back to home</div>
    <div class="detail-code mono">${s.code}</div>
    <div class="detail-title">${s.title}</div>
    <div class="detail-sub">${s.short}</div>

    <div class="section-block">
      <div class="block-label">What it covers</div>
      <p>${s.what}</p>
    </div>

    <div class="section-block">
      <div class="block-label">Who deals with this</div>
      <div class="who-line"><p>${s.who}</p></div>
    </div>

    <div class="section-block">
      <div class="block-label">Why it matters</div>
      <div class="why-box"><p>${s.why}</p></div>
    </div>

    <div class="section-block">
      <div class="block-label">Side by side</div>
      <h2>The comparison worth knowing cold</h2>
      ${compareBlocks}
    </div>

    <div class="section-block">
      <div class="block-label">Key terms</div>
      <div class="term-grid">${terms}</div>
    </div>

    <div class="section-block">
      <div class="block-label">In practice</div>
      <div class="example-box">
        <div class="example-mark">&ldquo;</div>
        <p>${s.example}</p>
      </div>
    </div>

    <div class="nav-footer">
      <div data-nav="section-${prev.id}">&larr; ${prev.code}, ${prev.title}</div>
      <div data-nav="section-${next.id}">${next.code}, ${next.title} &rarr;</div>
    </div>
  `;
}

function renderSection(id){
  const s = SECTIONS.find(x => x.id === id);
  if(!s) return renderHome();
  if(s.isComparison) return renderComparisonSection(s);

  const idx = SECTIONS.indexOf(s);
  const prev = SECTIONS[(idx - 1 + SECTIONS.length) % SECTIONS.length];
  const next = SECTIONS[(idx + 1) % SECTIONS.length];

  const terms = s.terms.map(([name, def]) => `
    <div class="term-card">
      <div class="term-name">${name}</div>
      <div class="term-def">${def}</div>
    </div>`).join('');

  return `
    <div class="back-link" data-nav="home">&larr; Back to home</div>
    <div class="detail-code mono">${s.code}</div>
    <div class="detail-title">${s.title}</div>
    <div class="detail-sub">${s.short}</div>

    <div class="section-block">
      <div class="block-label">What it covers</div>
      <p>${s.what}</p>
    </div>

    <div class="section-block">
      <div class="block-label">Who deals with this</div>
      <div class="who-line"><p>${s.who}</p></div>
    </div>

    <div class="section-block">
      <div class="block-label">Why it matters</div>
      <div class="why-box"><p>${s.why}</p></div>
    </div>

    <div class="section-block">
      <div class="block-label">Key terms</div>
      <h2>${s.title} vocabulary</h2>
      <div class="term-grid">${terms}</div>
    </div>

    <div class="section-block">
      <div class="block-label">In practice</div>
      <div class="example-box">
        <div class="example-mark">&ldquo;</div>
        <p>${s.example}</p>
      </div>
    </div>

    <div class="nav-footer">
      <div data-nav="section-${prev.id}">&larr; ${prev.code}, ${prev.title}</div>
      <div data-nav="section-${next.id}">${next.code}, ${next.title} &rarr;</div>
    </div>
  `;
}

function renderOrientation(){
  const topics = ORIENTATION_TOPICS.map(t => `
    <div class="orient-topic">
      <h3 class="otitle">${t.title}</h3>
      <p>${t.text}</p>
      ${t.flow ? `<div class="flow-row">${t.flow.map((f,i) => `<span class="fstep">${f}</span>${i < t.flow.length-1 ? '<span class="fsep">&rarr;</span>' : ''}`).join('')}</div>` : ''}
    </div>`).join('');

  return `
    <div class="back-link" data-nav="home">&larr; Back to home</div>
    <div class="detail-code mono">ORIENTATION</div>
    <div class="detail-title">How Law Actually Works</div>
    <div class="detail-sub">The scaffolding behind every practice area: how it moves, who decides, and where the rules come from.</div>
    ${topics}
    <div class="site-footer"><div>Law 101, by Gianna Absi</div></div>
  `;
}

/* ================= ROUTING ================= */

function route(){
  const hash = location.hash.replace('#','') || 'home';
  const page = document.getElementById('page');

  if(hash === 'home'){
    page.innerHTML = renderHome();
  } else if(hash === 'orientation'){
    page.innerHTML = renderOrientation();
  } else if(hash.startsWith('section-')){
    page.innerHTML = renderSection(hash.replace('section-',''));
  } else {
    page.innerHTML = renderHome();
  }

  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.dataset.nav === hash);
  });

  window.scrollTo(0,0);
  document.getElementById('sidebar').classList.remove('open');
}

document.addEventListener('click', (e) => {
  const target = e.target.closest('[data-nav]');
  if(target){
    location.hash = target.dataset.nav;
  }
});

window.addEventListener('hashchange', route);
document.getElementById('menu-toggle').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});

route();
</script>
</body>
</html>
